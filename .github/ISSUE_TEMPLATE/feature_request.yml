name: 功能建议
description: 提出新功能或改进建议
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题或需求
      description: 请描述当前使用中哪里不方便，或你希望解决什么场景。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述你希望应用如何表现。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他做法？
  - type: textarea
    id: context
    attributes:
      label: 额外上下文
      description: 可以附截图、命令输出或相关链接。请勿包含敏感信息。
